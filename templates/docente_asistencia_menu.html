<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Menú Asistencia - Portal Docente</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/panel_docente.css') }}">
</head>
<body>
    <aside class="sidebar">
        <div class="sidebar-header"><h2><i class="fas fa-chalkboard-teacher"></i> Portal Docente</h2></div>
        <ul class="menu-lateral">
            <li><a href="{{ url_for('docente_bp.panel_docente') }}"><i class="fas fa-home"></i> Inicio</a></li>
            <li><a href="{{ url_for('docente_bp.ver_horario') }}"><i class="fas fa-calendar-alt"></i> Mi Horario</a></li>
            <li><a href="{{ url_for('docente_bp.asistencia_menu') }}" class="active"><i class="fas fa-user-check"></i> Asistencia</a></li>
            <li><a href="{{ url_for('docente_bp.notas_menu') }}"><i class="fas fa-star"></i> Calificaciones</a></li>
        </ul>
        <a href="{{ url_for('auth_bp.logout') }}" class="btn-logout"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a>
    </aside>

    <main class="main-content">
        <div class="header-content">
            <h1><i class="fas fa-user-check" style="color: #3498db;"></i> Registro de Asistencia</h1>
        </div>

        <div class="card-info">
            <p style="margin-bottom: 20px;">Selecciona un curso para pasar la lista del día de hoy.</p>
            
            {% if cursos %}
                <div style="display: flex; gap: 15px; flex-wrap: wrap;">
                    {% for curso in cursos %}
                        <a href="{{ url_for('docente_bp.tomar_asistencia', id_curso=curso[0], nombre_curso=curso[1]) }}" 
                           style="background-color: #f8f9fa; border: 1px solid #ddd; padding: 20px; border-radius: 8px; text-decoration: none; color: #2c3e50; font-weight: bold; width: 200px; text-align: center; transition: 0.3s;">
                            <i class="fas fa-users" style="font-size: 24px; color: #3498db; display: block; margin-bottom: 10px;"></i>
                            {{ curso[1] }}
                        </a>
                    {% endfor %}
                </div>
            {% else %}
                <p style="color: #e67e22;"><i class="fas fa-info-circle"></i> No tienes cursos asignados.</p>
            {% endif %}
        </div>
    </main>
</body>
</html>
